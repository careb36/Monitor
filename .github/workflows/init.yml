name: Init – Create develop branch

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "yes" to confirm creating the develop branch from main'
        required: true
        default: "no"

jobs:
  create-develop:
    name: Create develop branch
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'yes'
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Create develop branch if it does not exist
        run: |
          if git ls-remote --heads origin develop | grep -q develop; then
            echo "Branch 'develop' already exists — nothing to do."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git checkout -b develop
            git push origin develop
            echo "Branch 'develop' created from 'main'."
          fi

      - name: Remove stale copilot branches
        run: |
          STALE_BRANCHES=(
            "copilot/create-dashboard-monitoring-boilerplate"
            "copilot/deploy-monitor"
          )
          for branch in "${STALE_BRANCHES[@]}"; do
            if git ls-remote --heads origin "$branch" | grep -q "$branch"; then
              git push origin --delete "$branch"
              echo "Deleted stale branch: $branch"
            else
              echo "Branch '$branch' not found — skipping."
            fi
          done
