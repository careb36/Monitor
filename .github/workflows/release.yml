name: CI – Release & Hotfix

on:
  push:
    branches:
      - "release/**"
      - "hotfix/**"
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    name: Build, Test & Verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

          - name: Cache OWASP Dependency Check Database
          uses: actions/cache@v4
          with:
          path: ~/.m2/repository/org/owasp/dependency-check-data/
          key: ${{ runner.os }}-owasp-db-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-owasp-db-

          - name: Build, Test & Verify
          run: mvn --batch-mode clean verify -DnvdApiKey=${{ secrets.NVD_API_KEY }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-test-results
          path: "**/target/surefire-reports/*.xml"
          retention-days: 14

  tag-version:
    name: Tag Release Version
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/release/')
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from branch name
        id: extract_version
        run: |
          BRANCH="${GITHUB_REF#refs/heads/release/}"
          echo "version=v${BRANCH}" >> "$GITHUB_OUTPUT"

      - name: Create Git tag
        env:
          VERSION: ${{ steps.extract_version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$VERSION"
          git push origin "$VERSION"

  tag-hotfix:
    name: Tag Hotfix Version
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/heads/hotfix/')
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Extract version from pom.xml
        id: extract_version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "version=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create Git tag
        env:
          VERSION: ${{ steps.extract_version.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$VERSION"
          git push origin "$VERSION"
