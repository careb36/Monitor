name: CD – Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Cache OWASP Dependency Check Database
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data/
          key: ${{ runner.os }}-owasp-db-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-owasp-db-

      - name: Build and verify production artifact (includes OWASP dependency check)
        run: mvn --batch-mode clean verify -Powasp -DnvdApiKey=${{ secrets.NVD_API_KEY }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: monitor-production
          path: "**/target/*.jar"
          retention-days: 30

      - name: Bootstrap develop branch
        run: |
          if git ls-remote --exit-code --heads origin develop > /dev/null 2>&1; then
            echo "Branch 'develop' already exists — nothing to do."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git checkout -b develop
            git push origin develop
            echo "Branch 'develop' created from 'main'."
          fi

      # Add your deployment steps here (e.g., Docker push, server deploy, etc.)
      # - name: Deploy to server
      #   run: echo "Deploy step goes here"
