name: Lint – Conventional Commits & Branch Names

on:
  pull_request:
    branches:
      - main
      - develop
    types:
      - opened
      - synchronize
      - reopened
      - edited

jobs:
  pr-title:
    name: Validate PR Title (Conventional Commits)
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write  # required to auto-fix Copilot PR titles

    steps:
      - name: Validate and auto-fix PR title (Copilot) or fail (humans)
        uses: actions/github-script@v7
        with:
          script: |
            const TYPES = 'feat|fix|docs|style|refactor|test|chore|perf|ci';
            const CC_PATTERN = new RegExp(`^(${TYPES})(\\([a-zA-Z0-9_-]+\\))?!?: .+`);

            let title = context.payload.pull_request.title;
            const actor = context.actor;
            const isCopilot = actor === 'copilot[bot]';

            if (CC_PATTERN.test(title)) {
              console.log(`✅ PR title is valid: "${title}"`);
              return;
            }

            if (!isCopilot) {
              core.setFailed(
                `❌ PR title does not follow Conventional Commits format.\n\n` +
                `  Expected : <type>(<scope>): <description>\n` +
                `  Got      : "${title}"\n\n` +
                `  Allowed types: ${TYPES.replace(/\|/g, ', ')}\n\n` +
                `  Examples:\n` +
                `    feat(auth): add JWT-based authentication\n` +
                `    fix(monitor): resolve null pointer on startup\n` +
                `    docs(contributing): update branching strategy`
              );
              return;
            }

            // ── Copilot PR: infer type and auto-fix ────────────────────────────────
            console.log(`⚠️  Copilot PR title "${title}" is not Conventional Commits compliant — auto-fixing…`);

            const lower = title.toLowerCase();
            let type = 'chore';
            if      (/\b(add|implement|introduce|create|new feature)\b/.test(lower)) type = 'feat';
            else if (/\b(fix|resolve|correct|patch|repair|bug)\b/.test(lower))       type = 'fix';
            else if (/\b(doc|readme|changelog|contributing)\b/.test(lower))          type = 'docs';
            else if (/\b(test|spec|coverage)\b/.test(lower))                         type = 'test';
            else if (/\b(refactor|restructure|rename|extract|clean)\b/.test(lower))  type = 'refactor';
            else if (/\b(perf|performance|optimize|speed)\b/.test(lower))            type = 'perf';
            else if (/\b(ci|pipeline|workflow|build|deploy)\b/.test(lower))          type = 'ci';

            // Strip common Copilot prefixes like "copilot: " before rebuilding
            let description = title
              .replace(/^copilot[:\s-]+/i, '')
              .replace(/^(feat|fix|docs|style|refactor|test|chore|perf|ci)[:\s-]+/i, '')
              .trim();
            description = description.charAt(0).toLowerCase() + description.slice(1);

            const newTitle = `${type}: ${description}`;

            await github.rest.pulls.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              title: newTitle,
            });

            console.log(`✅ Copilot PR title auto-fixed to: "${newTitle}"`);

  branch-name:
    name: Validate Branch Naming Convention
    runs-on: ubuntu-latest
    permissions: {}

    steps:
      - name: Check branch name follows GitFlow convention
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          # Allow GitFlow branch prefixes and additional automation/tooling prefixes
          PATTERN='^(feature|bugfix|release|hotfix|fix|docs|chore|refactor|test|perf|ci|copilot)/.+'
          if echo "$HEAD_REF" | grep -qE "$PATTERN"; then
            echo "Branch name is valid: $HEAD_REF"
          else
            echo "ERROR: Branch name does not follow the GitFlow naming convention."
            echo ""
            echo "GitFlow prefixes: feature/, bugfix/, release/, hotfix/"
            echo "Also accepted:    fix/, docs/, chore/, refactor/, test/, perf/, ci/, copilot/"
            echo ""
            echo "Examples:"
            echo "  feature/user-authentication"
            echo "  bugfix/incorrect-calculation"
            echo "  release/1.2.0"
            echo "  hotfix/fix-null-pointer"
            echo ""
            echo "Got: $HEAD_REF"
            exit 1
          fi
