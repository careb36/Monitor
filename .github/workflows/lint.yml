name: Lint – Conventional Commits & Branch Names

on:
  pull_request:
    branches:
      - main
      - develop
    types:
      - opened
      - synchronize
      - reopened
      - edited

jobs:
  pr-title:
    name: Validate PR Title (Conventional Commits)
    runs-on: ubuntu-latest
    permissions: {}

    steps:
      - name: Check PR title follows Conventional Commits
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # Pattern: type(optional-scope): description
          PATTERN='^(feat|fix|docs|style|refactor|test|chore|perf|ci)((\([a-zA-Z0-9_-]+\))?!?): .+'
          if echo "$PR_TITLE" | grep -qE "$PATTERN"; then
            echo "PR title is valid: $PR_TITLE"
          else
            echo "ERROR: PR title does not follow Conventional Commits format."
            echo ""
            echo "Expected format: <type>(<scope>): <description>"
            echo "Examples:"
            echo "  feat(auth): add JWT-based authentication"
            echo "  fix(monitor): resolve null pointer on startup"
            echo "  docs(contributing): update branching strategy"
            echo ""
            echo "Allowed types: feat, fix, docs, style, refactor, test, chore, perf, ci"
            echo "Got: $PR_TITLE"
            exit 1
          fi

  branch-name:
    name: Validate Branch Naming Convention
    runs-on: ubuntu-latest
    permissions: {}

    steps:
      - name: Check branch name follows GitFlow convention
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          # Allow GitFlow branch prefixes and additional automation/tooling prefixes
          PATTERN='^(feature|bugfix|release|hotfix|fix|docs|chore|refactor|test|perf|ci|copilot)/.+'
          if echo "$HEAD_REF" | grep -qE "$PATTERN"; then
            echo "Branch name is valid: $HEAD_REF"
          else
            echo "ERROR: Branch name does not follow the GitFlow naming convention."
            echo ""
            echo "GitFlow prefixes: feature/, bugfix/, release/, hotfix/"
            echo "Also accepted:    fix/, docs/, chore/, refactor/, test/, perf/, ci/, copilot/"
            echo ""
            echo "Examples:"
            echo "  feature/user-authentication"
            echo "  bugfix/incorrect-calculation"
            echo "  release/1.2.0"
            echo "  hotfix/fix-null-pointer"
            echo ""
            echo "Got: $HEAD_REF"
            exit 1
          fi
