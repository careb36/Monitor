server:
  port: 0

spring:
  application:
    name: monitor-test

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: test-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

  mail:
    host: localhost
    port: 25

monitor:
  kafka:
    topic:
      log-traza: oracle.SYSTEM.LOG_TRAZA
  polling:
    interval-ms: 3600000
    targets:
      databases:
        - oracle-secondary-01
      daemons:
        - batch-processor
  mail:
    from: test@example.com
    subject-prefix: "TEST ALERT"
    recipients:
      - test-recipient@example.com
