server:
  port: 8080

spring:
  application:
    name: monitor-dashboard

  # ─── Kafka ───────────────────────────────────────────────────────────────────
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: monitor-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

  # ─── Mail (Groupwise SMTP) ───────────────────────────────────────────────────
  mail:
    host: smtp.groupwise.example.com
    port: 25
    username: monitor-alerts@example.com
    password: changeme
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

# ─── Application-specific settings ────────────────────────────────────────────
monitor:
  # Kafka topics
  kafka:
    topic:
      log-traza: oracle.SYSTEM.LOG_TRAZA

  # Health-check polling
  polling:
    interval-ms: 30000
    targets:
      databases:
        - oracle-secondary-01
        - oracle-secondary-02
      daemons:
        - batch-processor
        - report-generator
        - file-watcher

  # Mail alert settings
  mail:
    from: monitor-alerts@example.com
    subject-prefix: "CRITICAL ALERT"
    recipients:
      - ops-team@example.com
      - oncall@example.com

logging:
  level:
    com.monitor: DEBUG
    org.springframework.kafka: INFO
