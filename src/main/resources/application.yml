server:
  port: 8080

# ─── Actuator (Docker healthcheck via /actuator/health) ────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

spring:
  application:
    name: monitor-dashboard
  threads:
    virtual:
      enabled: true

  # ─── Kafka ───────────────────────────────────────────────────────────────────
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: monitor-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

  # ─── Mail (SMTP with TLS – CWE-319: no cleartext transmission) ──────────────
  mail:
    host: ${MAIL_HOST:smtp.groupwise.example.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:monitor-alerts@example.com}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

# ─── Application-specific settings ────────────────────────────────────────────
monitor:
  # Kafka topics
  kafka:
    topic:
      log-traza: oracle.SYSTEM.LOG_TRAZA

  # Health-check polling
  polling:
    interval-ms: 30000
    targets:
      databases:
        - oracle-secondary-01
        - oracle-secondary-02
      daemons:
        - batch-processor
        - report-generator
        - file-watcher

  # Alert deduplication (AlertDeduplicator)
  # Identical alerts (same type + severity + source) are suppressed for this window.
  dedup:
    window-seconds: 300        # 5 minutes — suppress repeat alerts within this period
    cleanup-interval-ms: 60000 # How often to evict expired fingerprints from memory

  # Internal alert queue (EventBus backpressure buffer)
  queue:
    capacity: 1000             # Max events buffered between producers and SSE fan-out

  # Mail alert settings
  mail:
    from: ${MAIL_FROM:monitor-alerts@example.com}
    subject-prefix: "CRITICAL ALERT"
    recipients:
      - ${MAIL_RECIPIENT_1:ops-team@example.com}
      - ${MAIL_RECIPIENT_2:oncall@example.com}
    retry-interval-ms: 60000   # How often to retry failed email sends

  # SSE keep-alive
  sse:
    heartbeat-interval-ms: 15000

  # ─── Critical Outbox ────────────────────────────────────────────────────────
  outbox:
    jpa:
      enabled: ${MONITOR_OUTBOX_JPA_ENABLED:false}
    in-memory:
      max-delivered-entries: 500

  # ─── CORS (OWASP A05: never wildcard in production) ─────────────────────────
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

  # ─── Rate limiting (Bucket4j – CWE-307 brute-force prevention) ─────────────
  rate-limit:
    enabled: true
    capacity: 20               # Max requests per time window
    refill-tokens: 20          # Tokens to add per refill
    refill-duration-seconds: 60 # Refill window

logging:
  level:
    com.monitor: DEBUG
    org.springframework.kafka: INFO
    org.springframework.security: INFO

# ════════════════════════════════════════════════════════════════════════════════
# Profile: dev – relaxed for local development
# Activate with: --spring.profiles.active=dev
# ════════════════════════════════════════════════════════════════════════════════
---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:oracle:thin:@localhost:1521:xe
    driver-class-name: oracle.jdbc.OracleDriver
    username: system
    password: ${ORACLE_PASSWORD:oracle}
  jpa:
    database-platform: org.hibernate.dialect.OracleDialect
    hibernate:
      ddl-auto: update
    show-sql: false

monitor:
  cors:
    allowed-origins: http://localhost:3000,http://localhost:8080

logging:
  level:
    com.monitor: DEBUG
    org.springframework.security: DEBUG

# ════════════════════════════════════════════════════════════════════════════════
# Profile: staging – production-like with more verbose logging
# Activate with: --spring.profiles.active=staging
# ════════════════════════════════════════════════════════════════════════════════
---
spring:
  config:
    activate:
      on-profile: staging

monitor:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}

logging:
  level:
    com.monitor: INFO
    org.springframework.security: INFO

# ════════════════════════════════════════════════════════════════════════════════
# Profile: prod – strict security, minimal logging, aggressive rate limits
# Activate with: --spring.profiles.active=prod
# ════════════════════════════════════════════════════════════════════════════════
---
spring:
  config:
    activate:
      on-profile: prod

monitor:
  outbox:
    jpa:
      enabled: true
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
  rate-limit:
    capacity: 10
    refill-tokens: 10
    refill-duration-seconds: 60

logging:
  level:
    com.monitor: WARN
    org.springframework.security: WARN
    org.springframework.kafka: WARN
